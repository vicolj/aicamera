name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-x86:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev

      - name: Configure, build and test
        run: |
          ./scripts/build-x86.sh

      - name: Week2 integration test
        run: |
          sudo apt-get install -y ffmpeg python3
          chmod +x scripts/test-week2-integration.sh
          ./scripts/test-week2-integration.sh

      - name: Week3 integration test
        run: |
          chmod +x scripts/test-week3-integration.sh
          ./scripts/test-week3-integration.sh

      - name: Week4 integration test
        run: |
          chmod +x scripts/test-week4-integration.sh
          ./scripts/test-week4-integration.sh

      - name: Week5 integration test
        run: |
          sudo apt-get install -y curl ffmpeg
          chmod +x scripts/test-week5-integration.sh
          ./scripts/test-week5-integration.sh

      - name: Week6 integration test
        run: |
          chmod +x scripts/test-week6-integration.sh
          ./scripts/test-week6-integration.sh
