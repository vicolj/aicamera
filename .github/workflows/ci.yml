name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repository sanity check
        run: |
          echo "Branch: ${GITHUB_REF_NAME}"
          git status --short
