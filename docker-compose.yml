services:
  edger-rec:
    image: edger-rec:demo
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edger-rec-demo
    ports:
      - "8080:8080"
      - "18080:18080"
    volumes:
      - edger-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  edger-data:
